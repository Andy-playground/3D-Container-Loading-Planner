<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Container Loading Planner</title>
  <link rel="stylesheet" href="styles/main.css?v=6">
</head>
<body>
  <div id="topbar">
    <button id="packBtn" data-i18n="btn.pack">▶ 裝載</button>
    <button id="clearBtn" class="danger" data-i18n="btn.clear">清除</button>
    <button id="importBtn" class="secondary" data-i18n="btn.import">匯入 JSON</button>
    <button id="exportBtn" class="secondary" data-i18n="btn.export">匯出 JSON</button>
    <button id="demoBtn" class="secondary" data-i18n="btn.demo">載入示範</button>
    <input type="file" id="importFile" accept=".json" style="display:none">
    <div id="langPicker">
      <label for="langSelect" data-i18n="lang.label">語言</label>
      <select id="langSelect">
        <option value="zh">繁體中文</option>
        <option value="en">English</option>
      </select>
    </div>
    <div id="stats" data-i18n="stats.notLoaded">尚未裝載</div>
  </div>

  <div id="main">
    <aside id="sidebar">
      <section>
        <h3 data-i18n="h.selectContainer">選擇貨櫃</h3>
        <div class="field">
          <select id="containerSelect"></select>
        </div>
        <div id="containerInfo"></div>
      </section>

      <section id="addCargoSection">
        <h3 data-i18n="h.addCargo">新增貨物類型</h3>
        <div class="field">
          <label for="cargoName" data-i18n="f.name">名稱</label>
          <input type="text" id="cargoName" value="貨物A">
        </div>
        <div class="field-row">
          <div class="field">
            <label for="cargoL" data-i18n="f.length">長 (cm)</label>
            <input type="number" id="cargoL" value="100" min="1">
          </div>
          <div class="field">
            <label for="cargoW" data-i18n="f.width">寬 (cm)</label>
            <input type="number" id="cargoW" value="80" min="1">
          </div>
          <div class="field">
            <label for="cargoH" data-i18n="f.height">高 (cm)</label>
            <input type="number" id="cargoH" value="60" min="1">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="cargoWeight" data-i18n="f.weight">重量 (kg/箱)</label>
            <input type="number" id="cargoWeight" value="10" min="0" step="0.1">
          </div>
          <div class="field">
            <label for="cargoQty" data-i18n="f.qty">數量</label>
            <input type="number" id="cargoQty" value="20" min="1">
          </div>
        </div>
        <div class="field">
          <label for="cargoColor" data-i18n="f.color">顏色</label>
          <input type="color" id="cargoColor" value="#3498db">
        </div>
        <div class="field-row">
          <div class="field">
            <label for="cargoMaxLayers" data-i18n="f.maxLayers">最大堆疊層數</label>
            <input type="number" id="cargoMaxLayers" value="99" min="1">
          </div>
          <div class="field">
            <label for="cargoMaxLoadTop" data-i18n="f.maxLoadTop">頂壓上限 (kg)</label>
            <input type="number" id="cargoMaxLoadTop" value="500" min="0">
          </div>
        </div>
        <div class="field">
          <label for="cargoSupportRatio" data-i18n="f.supportRatio">支撐比例下限 (%)</label>
          <input type="number" id="cargoSupportRatio" value="80" min="0" max="100">
        </div>
        <div class="field">
          <label for="cargoPriority" data-i18n="f.priority">裝載優先權</label>
          <select id="cargoPriority">
            <option value="normal" data-i18n="f.priorityNormal">normal（一般）</option>
            <option value="urgent" data-i18n="f.priorityUrgent">urgent（急件，優先排）</option>
            <option value="lifo" data-i18n="f.priorityLifo">lifo（後進先出）</option>
          </select>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="cargoYaw" checked>
          <label for="cargoYaw" data-i18n="f.yaw">Yaw 平面 90° 旋轉（L↔W）</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="cargoPitch">
          <label for="cargoPitch" data-i18n="f.pitch">Pitch 翻轉（W↔H，需取消 ↑）</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="cargoRoll">
          <label for="cargoRoll" data-i18n="f.roll">Roll 翻轉（L↔H，需取消 ↑）</label>
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="cargoThisSideUp" checked>
          <label for="cargoThisSideUp" data-i18n="f.thisSideUp">↑ This Side Up（鎖定 Pitch/Roll）</label>
        </div>
        <div class="form-actions">
          <button id="addCargoBtn" class="add-btn" data-i18n="btn.addCargo">+ 加入貨物</button>
          <button id="cancelEditBtn" class="cancel-btn" style="display:none" data-i18n="btn.cancelEdit">取消編輯</button>
        </div>
      </section>

      <section>
        <h3 data-i18n="h.cargoList">已定義貨物</h3>
        <div id="cargoList"></div>
        <div id="cargoListEmpty" data-i18n="cargo.empty">尚未新增任何貨物</div>
      </section>

      <section>
        <h3 data-i18n="h.displayOptions">顯示選項</h3>
        <div class="field">
          <label for="opacitySlider" data-i18n="f.opacity">透明度</label>
          <input type="range" id="opacitySlider" min="20" max="100" value="100">
        </div>
        <div class="checkbox-row">
          <input type="checkbox" id="labelsToggle" checked>
          <label for="labelsToggle" data-i18n="f.showLabels">顯示貨物名稱（5 個面）</label>
        </div>
      </section>
    </aside>

    <div id="canvasWrap">
      <div id="canvas"></div>
      <div id="detailsPanel" style="display:none">
        <div id="detailsHeader">
          <span id="detailsTitle" data-i18n="details.title">貨物明細</span>
          <button id="detailsClose" aria-label="Close" data-i18n-aria-label="details.close">✕</button>
        </div>
        <div id="detailsBody"></div>
      </div>
    </div>
  </div>

  <script type="module" src="src/app.js?v=6"></script>
</body>
</html>
